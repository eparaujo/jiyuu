{% extends "base.html" %}

{% block content %}
<div class="container mt-4">

    <h4 class="mb-3">Definir senha para {{ karateca.name }}</h4>

    <div class="card shadow-sm">
        <div class="card-body">

            <form method="post">
                {% csrf_token %}

                <div class="row">
                    <div class="col-12">
                        <div class="mb-3">
                            <label class="form-label">Senha</label>
                            {{ form.password }}
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="mb-3">
                            <label class="form-label">Confirmar Senha</label>
                            {{ form.confirm_password }}
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        Salvar
                    </button>

                    <a href="{% url 'karateca_list' %}" class="btn btn-secondary">
                        Cancelar
                    </a>
                </div>

            </form>

        </div>
    </div>

</div>
{% endblock %}
