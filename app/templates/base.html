{% load static %}
<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="white">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
      /* Marca d’água discreta no fundo */
      .watermark {
        position: fixed;
        inset: 0;
        background: url("{% static 'img/imb_03.jpg' %}") no-repeat center center;
        background-size: cover; /* use 'contain' se quiser ver a imagem inteira */
        opacity: 0.08;
        pointer-events: none;
        z-index: 0;
      }

      /* Garante que o conteúdo fique sobre a marca d’água */
      .app-content {
        position: relative;
        z-index: 1;
        min-height: 100vh; /* ocupa altura total */
        display: flex;
        flex-direction: column;
      }

      /* Conteúdo principal ocupa o espaço todo */
      main {
        flex: 1;
        width: 100%;
        padding: 1.5rem;
      }

      /* Ajusta container para ocupar toda a largura */
      .container-fluid, .row, .col, .col-md-*, .col-lg-* {
        max-width: 100% !important;
      }

      /* Evita margens internas desnecessárias */
      body, html {
        margin: 0;
        padding: 0;
        overflow-x: hidden; /* evita barra de rolagem lateral */
      }

      footer {
        text-align: center;
        padding: 0.75rem 0;
        opacity: 0.7;
      }
    </style>
  </head>

  <body>
    <div class="watermark"></div>

    <div class="app-content">
      {% include 'components/_header.html' %}

      {% if user.is_authenticated %}
        {% include 'components/_menu2.html' %}
      {% endif %}

      <main class="container-fluid">
        {% block content %}{% endblock %}
      </main>

      {% include 'components/_footer.html' %}
    </div>

    {% block extra_scripts %}{% endblock %}
  </body>
</html>
