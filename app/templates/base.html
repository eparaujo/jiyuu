{% load static %}
<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
      /* ocupa a tela toda e fica atrás do conteúdo */
      .watermark {
        position: fixed;
        inset: 0;
        background: url("{% static 'img/imb_03.jpg' %}") no-repeat center center;
        background-size: contain;    /* troque para 'cover' se quiser preencher */
        opacity: 0.08;               /* transparência da marca d'água */
        pointer-events: none;        /* não captura cliques */
        z-index: 0;
      }
      /* garante que todo conteúdo fique acima da marca d'água */
      .app-content { position: relative; z-index: 1; }
    </style>
  </head>
  <body>
    <div class="watermark"></div>

    <div class="app-content">
      {% include 'components/_header.html' %}
      <div class="container-fluid">
        {% if user.is_authenticated %}
          {% include 'components/_menu2.html' %}
        {% endif %}
        <div class="col py-3">
          <div class="container mt-4">
            <main>
              {% block content %}{% endblock %}
            </main>
          </div>
        </div>
      </div>
      {% include 'components/_footer.html' %}
    </div>
  </body>
</html>
