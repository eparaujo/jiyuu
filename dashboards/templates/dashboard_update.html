{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-20 col-lg-6">
            <h3 class="display-6">Editar Dados do Dashboard</h3>

            <div class="card">
                <div class="card-body">
                    <form method="POST" class="form">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary">Gravar</button>
                    </form>
                </div>
            </div>

            <a href="{% url 'dashboard_list' %}" class="btn btn-secondary mt-3">Cancelar e Voltar</a>
        </div>
    </div>
</div>
{% endblock %}
