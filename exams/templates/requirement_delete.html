{% extends 'base.html' %}
{% block title %}SGK - Excluir Requisito{% endblock %}
{% block content %}
<h4 class="mb-3">Excluir Requisito #{{ object.id }}</h4>
<p>Tem certeza que deseja excluir este requisito?</p>
<form method="post">
  {% csrf_token %}
  <div class="d-flex gap-2">
    <a href="{% url 'requirement_list' %}" class="btn btn-secondary">Cancelar</a>
    <button type="submit" class="btn btn-danger">Excluir</button>
  </div>
</form>
{% endblock %}
