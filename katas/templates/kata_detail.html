{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
    <h3 class="display-6">Detalhes do Kata</h3>
    <div class="card">
        <div class="card-body">
            <h3 class="card-title">{{ object.namekata }}</h3>
            <p class="card-text">Estilo: {{ object.style }}</p>
            <p class="card-text">Número de Movimentos do Kata: {{ object.qtde_moviments }}</p>
            <p class="card-text">Vídeo do Kata: {{ object.file }}</p>
            <p class="card-text">URL do Vídeo do Kata: {{ object.link }}</p>            
            
        </div>
    </div>
    <a href="{% url 'kata_list' %}" class="btn btn-secondary mt-3">Cancelar e Voltar</a>
</div>

{% endblock %}
