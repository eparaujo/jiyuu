{% extends 'base.html'  %}

{% block title %}
SGK - Cadastro de Dia da Semana
{% endblock %}

{% block content %}

<div class="row mb-3">

    <div class="col-md-6">
        <form method="get" action="{% url 'weekdays_list' %}">
            <div class="input-group">
                <input type="text" class="form-control" name="dayname" placeholder="Dia da Semana" value="{{ request.GET.dayname}}">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-search"></i>
                </button>
            </div>
        </form>
    </div>
    
    <div class="col-md-6">
        <a href="{% url 'weekdays_create' %}" class="btn btn-success float-end">
            <i class="bi bi-plus"></i>Novo Dia da Semana
        </a>
    </div>
</div>

<div class="table-responsive">
    <table class="table table-striped table-bordered">
        <thead class="thead-dark">
            <tr>
                <th>ID</th>
                <th>Dia da Semana</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for weekday in weekdays %}
                <tr>
                    <td> {{ weekday.id }} </td>
                    <td> {{ weekday.dayname }} </td>
                    <td> 
                        <a href="{% url 'weekdays_detail' weekday.id %}" class="btn btn-info btn-sm">
                            <i class="bi bi-eye"></i>
                        </a>                        
                     
                        <a href="{% url 'weekdays_update' weekday.id %}" class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil"></i>
                        </a>
                        
                        <a href="{% url 'weekdays_delete' weekday.id %}" class="btn btn-danger btn-sm">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% include 'components/_pagination.html' %}

{% endblock %}
