{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">
    <h3 class="display-6">Detalhes do Horário de Aula - Treinamento</h3>
    <div class="card">
        <div class="card-body">
            <h3 class="card-title">{{ object.name }}</h3>
            <p class="card-text">{{ object.description }}</p>
            <p class="card-text">{{ object.start }}</p>
            <p class="card-text">{{ object.end }}</p>
        </div>
    </div>
    <a href="{% url 'class_list' %}" class="btn btn-secondary mt-3">Cancelar e Voltar</a>
</div>

{% endblock %}
